version: '3.8'
services:
  # MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  # Time-Series Database
  influxdb:
    image: influxdb:2.0
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=factory
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetry
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=super-secret-auth-token

  # Metadata Database
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"

# Node.js Backend Service
  backend:
    image: node:20
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules  # Isolates container's node_modules
    ports:
      - "5000:5000"
    command: sh -c "npm install && npm run start"  # <-- Installs Linux modules on boot
    environment:
      - MQTT_BROKER=${MQTT_BROKER}
      - MONGO_URI=${MONGO_URI}
      - INFLUX_URL=${INFLUX_URL}
    depends_on:
      - mongodb
      - influxdb

  # React Frontend Service
  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules 
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0" # <-- Installs Linux modules on boot
    environment:
      - VITE_BACKEND_URL=http://localhost:5000